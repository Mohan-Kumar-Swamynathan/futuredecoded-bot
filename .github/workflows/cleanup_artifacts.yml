name: Cleanup Action Artifacts

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: "Number of newest artifacts to keep (0 = delete all)"
        required: false
        default: "0"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const keepLatest = Number('${{ inputs.keep_latest }}') || 0;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let page = 1;
            const allArtifacts = [];

            while (true) {
              const response = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });
              allArtifacts.push(...response.data.artifacts);
              if (response.data.artifacts.length < 100) {
                break;
              }
              page += 1;
            }

            allArtifacts.sort((left, right) => new Date(right.created_at) - new Date(left.created_at));
            const artifactsToDelete = keepLatest > 0 ? allArtifacts.slice(keepLatest) : allArtifacts;

            if (artifactsToDelete.length === 0) {
              core.info('No artifacts to delete.');
              return;
            }

            let deletedCount = 0;
            let freedBytes = 0;
            for (const artifact of artifactsToDelete) {
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
              deletedCount += 1;
              freedBytes += artifact.size_in_bytes || 0;
              core.info(`Deleted ${artifact.name} (${artifact.id}, ${artifact.size_in_bytes} bytes)`);
            }

            core.info(`Deleted ${deletedCount} artifact(s), freed ~${(freedBytes / 1024 / 1024).toFixed(1)} MB.`);
