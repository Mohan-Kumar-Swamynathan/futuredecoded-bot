name: FutureDecoded Daily Pipeline

# Re-run after cinematic fixes (stock video + Shorts pacing)

on:
  schedule:
    - cron: "30 0 * * *"  # 06:00 IST — finishes before 08:00 publish slot
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/**"

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python syntax
        run: python -m compileall -q src/futuredecoded

  pipeline:
    needs: syntax-check
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fontconfig

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install edge-tts

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m pytest tests/ -q

      - name: Verify imports
        env:
          PYTHONPATH: src
        run: python -c "from futuredecoded.pipeline.orchestrator import run_daily_pipeline; print('imports ok')"

      - name: Restore YouTube credentials
        env:
          YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
          CLIENT_SECRETS_BASE64: ${{ secrets.CLIENT_SECRETS_BASE64 }}
        run: |
          mkdir -p config
          if [ -n "$YOUTUBE_TOKEN_BASE64" ]; then
            echo "$YOUTUBE_TOKEN_BASE64" | base64 -d > config/futuredecoded_youtube_token.pickle
          fi
          if [ -n "$CLIENT_SECRETS_BASE64" ]; then
            echo "$CLIENT_SECRETS_BASE64" | base64 -d > config/futuredecoded_client_secrets.json
          fi

      - name: Run FutureDecoded pipeline
        env:
          PYTHONPATH: src
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          YOUTUBE_TOKEN_BASE64: ${{ secrets.YOUTUBE_TOKEN_BASE64 }}
          CLIENT_SECRETS_BASE64: ${{ secrets.CLIENT_SECRETS_BASE64 }}
          TREND_SCORE_THRESHOLD: 80
          TREND_SCORE_FALLBACK_THRESHOLD: 50
          GITHUB_MODELS_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          USE_CINEMATIC_RENDERER: "true"
          CINEMATIC_FALLBACK_KEN_BURNS: "false"
          STOCK_VIDEO_PROVIDER: pexels
        run: |
          if [ -n "$YOUTUBE_TOKEN_BASE64" ] && [ -n "$CLIENT_SECRETS_BASE64" ]; then
            echo "YouTube credentials found — running with upload"
            python -m futuredecoded.main --daily --upload
          else
            echo "YouTube credentials missing — running dry-run (no upload)"
            python -m futuredecoded.main --daily --dry-run
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-debug-${{ github.run_id }}
          path: |
            outputs/**/*.json
            outputs/**/*.txt
            outputs/**/*.ass
            outputs/**/description_*.txt
            outputs/**/scene_manifest.json
          retention-days: 1
          if-no-files-found: ignore
          compression-level: 9
